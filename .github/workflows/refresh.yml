name: Refresh Dashboard

on:
  # Manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

  # Automatic: every Monday at 09:00 Warsaw time (07:00 UTC)
  schedule:
    - cron: '0 7 * * 1'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push updated HTML files

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python scripts/run_pipeline.py

      - name: Commit and push updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html partner_performance.html
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "refresh: dashboard update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
